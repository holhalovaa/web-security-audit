name: CI

on:
  push:
    branches: ["main", "develop"]
  pull_request:

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: Lint
        run: ruff check .

      - name: Tests
        run: pytest

      - name: SAST
        run: bandit -c pyproject.toml -r src

      - name: Dependency audit
        env:
          PYTHONUTF8: "1"
        run: |
          python -m pip freeze --exclude-editable > requirements-audit.txt
          pip-audit -r requirements-audit.txt --progress-spinner off || \
            (sleep 20 && pip-audit -r requirements-audit.txt --progress-spinner off) || \
            (sleep 40 && pip-audit -r requirements-audit.txt --progress-spinner off)
